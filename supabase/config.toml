# Local Supabase stack for the e2e sync suite (scripts/e2e-sync-setup.sh).
# Only the services the app actually uses are enabled — auth (email/password
# test users) and the Data API — so `supabase start` boots fewer containers.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "klipcode"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
# The schema's single source of truth is db-structure.sql at the repo root;
# scripts/e2e-sync-setup.sh mirrors it into supabase/migrations (gitignored)
# before starting or resetting the stack.
enabled = true

[db.seed]
enabled = false

[realtime]
enabled = false

[studio]
enabled = false

[local_smtp]
enabled = false

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3100"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# The tests create throwaway users with email/password (no confirmation email,
# since local_smtp is disabled and confirmations are off below).
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
